name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  security-and-build:
    name: Security, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deployment checks
        run: npm run verify
